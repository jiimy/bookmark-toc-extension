<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>bookmark-toc</title>
    <link rel="stylesheet" href="bookmark-ui.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="title">DOM 북마크</h1>
      <button id="pick" class="pick-btn" type="button">
        요소 선택 (<span id="pickKeyLabel">F2</span>)
      </button>
    </header>

    <p class="hint">
      페이지에서 <b id="hintKey">F2</b>를 누른 뒤 원하는 요소를 클릭하면 위치가
      저장됩니다.
    </p>

    <div class="shortcut-row">
      <span class="shortcut-label">단축키</span>
      <kbd id="shortcutDisplay" class="kbd">F2</kbd>
      <button id="changeShortcut" class="mini-btn" type="button">변경</button>
    </div>

    <div class="toolbar">
      <input
        id="search"
        class="search"
        type="search"
        placeholder="설명·텍스트·주소 검색..."
        autocomplete="off"
      />
      <button id="clear" class="clear-btn" type="button">전체 삭제</button>
    </div>

    <ul id="domList" class="list"></ul>
    <p id="empty" class="empty" hidden>저장된 북마크가 없습니다.</p>

    <script src="popup.js"></script>
  </body>
</html>
